<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trader 90D Rescue</title>
<style>
body{margin:0;background:#07111f;color:#eaf2ff;font-family:Arial,sans-serif}
header{background:#08182b;padding:18px;border-bottom:1px solid #1b3f69}
h1{margin:0;font-size:24px}
p{color:#9ebde4}
main{padding:16px;max-width:1100px;margin:auto}
nav{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
button{border:0;border-radius:10px;background:#1f77d4;color:white;font-weight:700;padding:11px 14px}
button.sec{background:#153456}
button.red{background:#a83a3a}
.screen{display:none}
.screen.active{display:block}
.card,.box{background:#0e1d33;border:1px solid #1b3f69;border-radius:16px;padding:16px;margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
input,select,textarea{width:100%;padding:11px;border-radius:10px;border:1px solid #244b78;background:#07111f;color:white;margin-top:5px}
textarea{min-height:80px}
label{color:#bdd4f2;font-size:13px}
.row{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid #244b78;padding:10px 0}
.small{font-size:12px;padding:7px 9px}
@media(max-width:700px){.grid{grid-template-columns:1fr}.row{display:block}}
</style>
</head>
<body>
<header>
<h1>Trader 90D Control Center</h1>
<p>Versão resgate estável</p>
</header>
<main>
<nav>
<button onclick="show('dash')">Dashboard</button>
<button onclick="show('contas')">Contas</button>
<button onclick="show('ops')">Operações</button>
<button onclick="show('diario')">Diário</button>
<button onclick="show('dados')">Backup</button>
</nav>

<section id="dash" class="screen active">
<div class="card"><h2>Dashboard</h2>
<p>Meta: US$ 15.000</p>
<p id="resumo">Carregando...</p>
</div>
<div class="box"><h3>Últimos registros</h3><div id="feed">Nenhum registro.</div></div>
</section>

<section id="contas" class="screen">
<div class="card"><h2>Contas</h2>
<input type="hidden" id="contaEdit">
<div class="grid">
<label>Mesa<select id="mesa"><option>Apex</option><option>TradeDay</option><option>Mide</option><option>Earn2Trade</option></select></label>
<label>Nome/ID<input id="contaNome" placeholder="Ex: Apex 01"></label>
<label>Status<select id="status"><option>Avaliação</option><option>Aprovada</option><option>Financiada</option><option>Reprovada</option></select></label>
<label>Saldo<input id="saldo" type="number" value="0"></label>
</div>
<br><button onclick="salvarConta()">Salvar conta</button> <button class="sec" onclick="limparConta()">Nova</button>
</div>
<div class="box"><h3>Lista de contas</h3><div id="listaContas">Nenhuma conta.</div></div>
</section>

<section id="ops" class="screen">
<div class="card"><h2>Operações</h2>
<input type="hidden" id="opEdit">
<div class="grid">
<label>Conta<select id="opConta"></select></label>
<label>Setup<input id="setup" placeholder="Pullback A+"></label>
<label>Direção<select id="dir"><option>Compra</option><option>Venda</option></select></label>
<label>MNQ<input id="mnq" type="number" value="3"></label>
<label>Stop pts<input id="stop" type="number" value="30"></label>
<label>Alvo pts<input id="alvo" type="number" value="60"></label>
<label>Resultado USD<input id="resultado" type="number" placeholder="Ex: 300 ou -180"></label>
<label>Copiaria em 20 contas?<select id="copy"><option>Sim</option><option>Talvez</option><option>Não</option></select></label>
</div>
<br><button onclick="salvarOp()">Salvar operação</button> <button class="sec" onclick="limparOp()">Nova</button>
</div>
<div class="box"><h3>Histórico</h3><div id="listaOps">Nenhuma operação.</div></div>
</section>

<section id="diario" class="screen">
<div class="card"><h2>Diário</h2>
<input type="hidden" id="diarioEdit">
<div class="grid">
<label>Estado mental<select id="mental"><option>Calmo</option><option>Ansioso</option><option>Cansado</option><option>Confiante</option><option>Distraído</option></select></label>
<label>Viés<select id="vies"><option>Compra</option><option>Venda</option><option>Neutro</option></select></label>
<label>Disciplina 0-10<input id="disc" type="number" value="8"></label>
<label>Emocional 0-10<input id="emo" type="number" value="8"></label>
</div>
<label>Notícias/Dados<input id="noticias" placeholder="Ex: Payroll 09h30"></label>
<label>Pré-mercado<textarea id="pre"></textarea></label>
<label>Aprendizado<textarea id="apr"></textarea></label>
<br><button onclick="salvarDiario()">Salvar diário</button> <button class="sec" onclick="limparDiario()">Novo</button>
</div>
<div class="box"><h3>Registros</h3><div id="listaDiario">Nenhum diário.</div></div>
</section>

<section id="dados" class="screen">
<div class="card"><h2>Backup</h2>
<button onclick="backup()">Exportar backup</button>
<button class="red" onclick="apagarTudo()">Apagar tudo</button>
<p>Dados salvos no navegador/localStorage.</p>
</div>
</section>

<div id="erro" class="card" style="display:none;background:#3a1010"></div>
</main>

<script>
try{
var KEY="trader90_rescue_v1";
var db=JSON.parse(localStorage.getItem(KEY)||'{"contas":[],"ops":[],"diarios":[]}');

function save(){localStorage.setItem(KEY,JSON.stringify(db));render();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function money(v){return "US$ "+Number(v||0).toLocaleString("en-US",{maximumFractionDigits:2});}
function show(id){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active")});document.getElementById(id).classList.add("active");}

function limparConta(){contaEdit.value="";mesa.value="Apex";contaNome.value="";status.value="Avaliação";saldo.value=0;}
function salvarConta(){
 if(!contaNome.value.trim()){alert("Informe o nome/ID da conta.");return;}
 var obj={id:contaEdit.value||uid(),mesa:mesa.value,nome:contaNome.value.trim(),status:status.value,saldo:Number(saldo.value||0)};
 var i=db.contas.findIndex(function(x){return x.id===obj.id});
 if(i>=0)db.contas[i]=obj;else db.contas.push(obj);
 limparConta();save();
}
function editarConta(id){var c=db.contas.find(function(x){return x.id===id});if(!c)return;contaEdit.value=c.id;mesa.value=c.mesa;contaNome.value=c.nome;status.value=c.status;saldo.value=c.saldo;show("contas");}
function excluirConta(id){if(confirm("Excluir conta?")){db.contas=db.contas.filter(function(x){return x.id!==id});save();}}

function limparOp(){opEdit.value="";setup.value="";dir.value="Compra";mnq.value=3;stop.value=30;alvo.value=60;resultado.value="";copy.value="Sim";}
function salvarOp(){
 if(!db.contas.length){alert("Cadastre uma conta primeiro.");return;}
 if(!setup.value.trim()){alert("Informe o setup.");return;}
 if(resultado.value===""){alert("Informe o resultado, mesmo que seja 0.");return;}
 var c=db.contas.find(function(x){return x.id===opConta.value});
 var obj={id:opEdit.value||uid(),data:new Date().toISOString().slice(0,10),contaId:c.id,conta:c.nome,mesa:c.mesa,setup:setup.value.trim(),dir:dir.value,mnq:Number(mnq.value||0),stop:Number(stop.value||0),alvo:Number(alvo.value||0),resultado:Number(resultado.value),copy:copy.value};
 var i=db.ops.findIndex(function(x){return x.id===obj.id});
 if(i>=0)db.ops[i]=obj;else db.ops.push(obj);
 limparOp();save();
}
function editarOp(id){var o=db.ops.find(function(x){return x.id===id});if(!o)return;opEdit.value=o.id;opConta.value=o.contaId;setup.value=o.setup;dir.value=o.dir;mnq.value=o.mnq;stop.value=o.stop;alvo.value=o.alvo;resultado.value=o.resultado;copy.value=o.copy;show("ops");}
function excluirOp(id){if(confirm("Excluir operação?")){db.ops=db.ops.filter(function(x){return x.id!==id});save();}}

function limparDiario(){diarioEdit.value="";mental.value="Calmo";vies.value="Compra";disc.value=8;emo.value=8;noticias.value="";pre.value="";apr.value="";}
function salvarDiario(){
 if(!noticias.value.trim() && !pre.value.trim() && !apr.value.trim()){alert("Preencha pelo menos um campo do diário.");return;}
 var obj={id:diarioEdit.value||uid(),data:new Date().toISOString().slice(0,10),mental:mental.value,vies:vies.value,disc:Number(disc.value||0),emo:Number(emo.value||0),noticias:noticias.value.trim(),pre:pre.value.trim(),apr:apr.value.trim()};
 var i=db.diarios.findIndex(function(x){return x.id===obj.id});
 if(i>=0)db.diarios[i]=obj;else db.diarios.push(obj);
 limparDiario();save();
}
function editarDiario(id){var d=db.diarios.find(function(x){return x.id===id});if(!d)return;diarioEdit.value=d.id;mental.value=d.mental;vies.value=d.vies;disc.value=d.disc;emo.value=d.emo;noticias.value=d.noticias;pre.value=d.pre;apr.value=d.apr;show("diario");}
function excluirDiario(id){if(confirm("Excluir diário?")){db.diarios=db.diarios.filter(function(x){return x.id!==id});save();}}

function backup(){var blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="backup_trader90.json";a.click();}
function apagarTudo(){if(confirm("Apagar todos os dados?")){db={contas:[],ops:[],diarios:[]};save();}}

function render(){
 var lucro=db.ops.reduce(function(s,o){return s+Number(o.resultado||0)},0);
 var gains=db.ops.filter(function(o){return Number(o.resultado)>0}).length;
 var win=db.ops.length?Math.round(gains/db.ops.length*100):0;
 var discMed=db.diarios.length?db.diarios.reduce(function(s,d){return s+Number(d.disc||0)},0)/db.diarios.length:0;
 resumo.innerHTML="Lucro: <b>"+money(lucro)+"</b><br>Operações: "+db.ops.length+"<br>Taxa de acerto: "+win+"%<br>Disciplina média: "+discMed.toFixed(1);

 opConta.innerHTML=db.contas.length?db.contas.map(function(c){return '<option value="'+c.id+'">'+c.nome+' • '+c.mesa+' • '+c.status+'</option>'}).join(""):'<option value="">Cadastre uma conta</option>';

 listaContas.innerHTML=db.contas.length?db.contas.map(function(c){return '<div class="row"><div><b>'+c.nome+'</b><br>'+c.mesa+' • '+c.status+' • '+money(c.saldo)+'</div><div><button class="small sec" onclick="editarConta(\''+c.id+'\')">Editar</button> <button class="small red" onclick="excluirConta(\''+c.id+'\')">Excluir</button></div></div>'}).join(""):"Nenhuma conta.";
 listaOps.innerHTML=db.ops.length?db.ops.slice().reverse().map(function(o){return '<div class="row"><div><b>'+o.data+'</b> • '+o.conta+'<br>'+o.setup+' • '+o.dir+' • '+o.mnq+' MNQ • '+money(o.resultado)+'</div><div><button class="small sec" onclick="editarOp(\''+o.id+'\')">Editar</button> <button class="small red" onclick="excluirOp(\''+o.id+'\')">Excluir</button></div></div>'}).join(""):"Nenhuma operação.";
 listaDiario.innerHTML=db.diarios.length?db.diarios.slice().reverse().map(function(d){return '<div class="row"><div><b>'+d.data+'</b> • '+d.mental+'<br>'+d.noticias+'</div><div><button class="small sec" onclick="editarDiario(\''+d.id+'\')">Editar</button> <button class="small red" onclick="excluirDiario(\''+d.id+'\')">Excluir</button></div></div>'}).join(""):"Nenhum diário.";

 var feedItems=[];
 db.ops.slice(-3).forEach(function(o){feedItems.push("Operação: "+o.conta+" • "+money(o.resultado));});
 db.diarios.slice(-3).forEach(function(d){feedItems.push("Diário: "+d.mental+" • "+d.vies);});
 feed.innerHTML=feedItems.length?feedItems.map(function(x){return '<div class="item">'+x+'</div>'}).join(""):"Nenhum registro.";
}
render();
}catch(e){
 document.getElementById("erro").style.display="block";
 document.getElementById("erro").innerHTML="<b>Erro no app:</b><br>"+e.message;
}
</script>
</body>
</html>
